root: true

env:
  browser: true
  node: true
  es2022: true
  jest: true

parserOptions:
  ecmaVersion: 2022
  sourceType: module

extends:
  - eslint:recommended

rules:
  # === Стиль кода ===
  indent: ["error", 2]
  quotes: ["error", "single", { avoidEscape: true }]
  semi: ["error", "always"]
  comma-dangle: ["error", "always-multiline"]
  arrow-parens: ["error", "always"]

  # === Запреты ===
  no-var: "error"
  no-console: ["warn", { allow: ["warn", "error"] }]
  no-debugger: "error"
  no-unused-vars: ["error", { argsIgnorePattern: "^_" }]

  # === Лучшие практики ===
  prefer-const: "error"
  no-useless-escape: "off"

  # === Магические числа (только валидные опции!) ===
  no-magic-numbers:
    - "warn"
    - ignore: [0, 1, -1]
      ignoreArrayIndexes: true
      enforceConst: true
      detectObjects: true

  # === Классы ===
  class-methods-use-this: "warn"

# === Переопределения для тестов ===
overrides:
  - files: ["tests/**/*.js", "*.test.js", "*.spec.js"]
    env:
      jest: true
      node: true
    rules:
      no-magic-numbers: "off"
      no-console: "off"
