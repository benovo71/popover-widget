root: true

env:
  browser: true
  node: true
  es2022: true
  jest: true

parserOptions:
  ecmaVersion: 2022
  sourceType: module

extends:
  - eslint:recommended

rules:
  indent: ['error', 2]
  quotes: ['error', 'single', { avoidEscape: true }]
  semi: ['error', 'always']
  comma-dangle: ['error', 'always-multiline']
  arrow-parens: ['error', 'always']
  no-var: 'error'
  no-console: ['warn', { allow: ['warn', 'error'] }]
  no-debugger: 'error'
  no-unused-vars: ['error', { argsIgnorePattern: '^_' }]
  prefer-const: 'error'
  no-useless-escape: 'off'
  no-magic-numbers:
    - 'warn'
    -
      ignore: [0, 1, -1]
      ignoreArrayIndexes: true
      enforceConst: true
      detectObjects: false
  class-methods-use-this: 'warn'